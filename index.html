<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop</title>

<style>
img {
    width: 320px;
    height: 2005px;      /* задаём нужную высоту */
    object-fit: cover;  /* включаем обрезку */
    object-position: top; /* фиксируем верх — обрежется снизу */
}
.button1 {
    width: 200px;
    height: 40px;
    position: absolute;
    top: 1420px;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #8B0203;
    color: #ffff;
    border-radius: 8px;
    display: flex;              /* включаем flex */
    align-items: center;        /* по вертикали */
    justify-content: center;    /* по горизонтали */
    text-decoration: none;      /* убрать подчёркивание */
}

.button2 {
    width: 230px;
    height: 43px;
    position: absolute;
    top: 1850px;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #ffffff;
    color: #000000;
    border-radius: 8px;
}
</style>

</head>
<body>
    <div class="image-container">
    <img src="KIRILL.png" alt="">
    <a href="https://yandex.com/maps/-/CPqomP0m" class="button1">Как добраться</a>
    <button class="button2">Перейти в телеграмм</button>
</div>
</body>
</html>
